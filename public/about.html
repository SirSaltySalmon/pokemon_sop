<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Salmon's Pokemon Smash or Pass - About</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .readme-content {
      line-height: 1.6;
    }
    .readme-content h1 {
      font-size: 2em;
      margin-top: 0;
      margin-bottom: 0.5em;
      border-bottom: 2px solid #eee;
      padding-bottom: 0.3em;
    }
    .readme-content h2 {
      font-size: 1.5em;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      border-bottom: 1px solid #eee;
      padding-bottom: 0.3em;
    }
    .readme-content h3 {
      font-size: 1.25em;
      margin-top: 1em;
      margin-bottom: 0.5em;
    }
    .readme-content p {
      margin-bottom: 1em;
    }
    .readme-content ul, .readme-content ol {
      margin-bottom: 1em;
      padding-left: 2em;
    }
    .readme-content li {
      margin-bottom: 0.5em;
    }
    .readme-content a {
      color: #007bff;
      text-decoration: none;
    }
    .readme-content a:hover {
      text-decoration: underline;
    }
    .readme-content code {
      background: #f4f4f4;
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
    }
    .readme-content pre {
      background: #f4f4f4;
      padding: 1em;
      border-radius: 5px;
      overflow-x: auto;
      margin-bottom: 1em;
    }
    .readme-content pre code {
      background: none;
      padding: 0;
    }
    .loading {
      text-align: center;
      padding: 2rem;
      color: #666;
    }
    .error {
      color: #dc3545;
      padding: 1rem;
      background: #f8d7da;
      border-radius: 4px;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="index.html" style="color:inherit;text-decoration:none;">Salmon's Pokemon Smash or Pass</a></h1>
    <nav>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="https://ko-fi.com/sirsalmon">Donate</a>
        <a href="https://github.com/SirSaltySalmon/pokemon-sop">GitHub</a>
    </nav>
  </header>
  <main>
    <div id="readme-container">
      <div class="loading">Loading README...</div>
    </div>
  </main>
  <script>
    async function loadReadme() {
      const container = document.getElementById('readme-container');
      
      try {
        const response = await fetch('/api/readme');
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Failed to load README');
        }
        
        container.innerHTML = `<div class="readme-content">${data.html}</div>`;
      } catch (error) {
        console.error('Error loading README:', error);
        container.innerHTML = `
          <div class="error">
            <strong>Error loading README:</strong> ${error.message}
          </div>
        `;
      }
    }
    
    // Load README when page loads
    loadReadme();
  </script>
</body>
</html>
